<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💕 Para Ti, Mi Amor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lora:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

  <!-- Corazones flotantes de fondo (los crea JS) -->
  <div id="fondo-corazones"></div>

  <!-- Encabezado -->
  <header>
    <h1>Para Ti, Mi Amor 💕</h1>
    <p>Con todo lo que tengo y todo lo que soy…</p>
    <div class="separador">💗</div>
  </header>

  <!-- Contenedor de las dos cartas -->
  <div class="contenedor-cartas">

    <!-- CARTA 1 -->
    <div class="carta rosa">
      <div class="icono">💖</div>
      <h2>Todo lo que Amo de Ti</h2>
      <div class="papel">
        <textarea id="carta1" readonly>
            Mi amor,
Yo amo todo absolutamente de ti, eres mi mayor obsesión, esos ojos en los q puedo ver un universo de momentos e historias a tu lado, al besar tus labios es como si estuviera comiendo mi comida favorita siento esa sensación única como tú, esa sonrisa es como ver el amanecer más bonito que he visto en mi vida, y créeme que podría verla mil veces más sin cansarme jamás.
Amo tu forma de reír, esa risa que sale sin filtro y que me contagia, aunque no sepa ni por qué. Amo cómo te ves cuando estás concentrada, cuando te emociones con algo que te gusta, cuando me miras y siento que soy la persona más afortunada del mundo.
Amo tu voz, amo tu presencia, amo hasta los pequeños detalles que quizás tú ni notas pero que yo guardo como tesoros. Amo la forma en que me haces sentir seguro, querido, completo.
Eres mi persona favorita en este mundo. No hay nadie como tú, y por eso te elegí, te elijo y te seguiré eligiendo cada día.
Gracias por existir, por ser tú, y por dejarme amarte.
        </textarea>
      </div>
      <p class="pista">Escribe con el corazón 💕</p>
    </div>

    <!-- CARTA 2 -->
    <div class="carta azul">
      <div class="icono">🌠</div>
      <h2>Lo que Quiero Seguir Viviendo Contigo</h2>
      <div class="papel">
        <textarea id="carta2" readonly>
            Mi amor,
Hoy quiero contarte todo lo que quiero seguir viviendo a tu lado.
Quiero seguir viendo esa sonrisa cada vez que algo te emociona, quiero seguir siendo el que te hace reír sin razón, el que está ahí cuando necesitas un abrazo y también cuando solo quieres compañía en silencio.
Quiero seguir construyendo recuerdos contigo, de esos que cuando sean viejos vamos a contar sonriendo. Quiero seguir aprendiendo de ti, porque cada día me enseñas algo nuevo sin darte cuenta.
Quiero seguir eligiéndote, en los días bonitos y en los difíciles. Quiero seguir siendo tu persona favorita, así como tú eres la mía.
Quiero más viajes, más planes, más noches hablando de todo y de nada. Más momentos simples que con tigo se convierten en los mejores momentos de mi vida.
Hoy cumplimos 7 meses, y lo único que pienso es que quiero 7 más, y luego 7 más, y así hasta perder la cuenta.
Gracias por estos 7 meses, mi amor. Apenas es el comienzo.
        </textarea>
      </div>
      <p class="pista">El futuro que imaginas 🌠</p>
    </div>

  </div>

  <!-- Pie de página -->
  <footer>
    <p>7 meses de amarte y apenas es el comienzo… 💕</p>
    <p class="firma">— Siempre tuyo 🥀</p>
  </footer>

  <script src="js/cartas.js"></script>
</body>
</html>
